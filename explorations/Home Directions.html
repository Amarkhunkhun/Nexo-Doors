<html lang="en">

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="DirectionC.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="home"
          title="Nexo Doors — Home Page"
          subtitle="Three premium directions · white / black / orange · pick one to build the full site"

          <DCArtboard id="a" label="A · Editorial Luxury" width={1360} height={1660}>

            <DirectionC />

        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
